<db-page>
  <header class="topbar">
    <db-button
      class="topbar-back"
      variant="ghost"
      icon="chevron_left"
      [noText]="true"
      (click)="back()">
      Back
    </db-button>
    <span class="topbar-brand wordmark">
      <span class="wordmark-db">DB</span>ringer
    </span>
    <a
      class="topbar-hack4rail"
      href="https://hack4rail.org/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Built at Hack4Rail 2026">
      <img
        src="/images/hack4rail-logo.jpg"
        alt=""
        aria-hidden="true"
        class="topbar-hack4rail-img" />
    </a>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</db-page>
