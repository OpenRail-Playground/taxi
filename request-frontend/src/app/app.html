<db-page>
  <header class="topbar" [attr.data-mode]="headerMode()">
    @if (headerMode() === 'home') {
      <db-brand class="topbar-brand">Taxi</db-brand>
      <db-link class="topbar-help" href="#" [showIcon]="false">
        Help
        <db-icon icon="question_mark_circle" />
      </db-link>
    } @else {
      <db-button
        class="topbar-back"
        variant="ghost"
        icon="chevron_left"
        [noText]="true"
        (click)="back()">
        Back
      </db-button>
      <db-brand class="topbar-brand">Taxi</db-brand>
      <span class="topbar-spacer" aria-hidden="true"></span>
    }
  </header>

  <main class="content">
    <router-outlet />
  </main>
</db-page>
