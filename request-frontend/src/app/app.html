<db-page>
  <header class="topbar">
    <db-button
      class="topbar-back"
      variant="ghost"
      icon="chevron_left"
      [noText]="true"
      (click)="back()">
      Back
    </db-button>
    <span class="topbar-brand wordmark">
      <span class="wordmark-db">DB</span>ringer
    </span>
    <db-link class="topbar-help" href="#" [showIcon]="false">
      Help
      <db-icon icon="question_mark_circle" />
    </db-link>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</db-page>
