---
# Supply-chain hardening for pnpm.
# - `minimumReleaseAge` blocks freshly published packages (mitigates rug-pulls).
#   `@db-ux/*` is excluded so theme bumps can land quickly.
# - `blockExoticSubdeps` rejects transitive dependencies from non-registry sources.
# - `allowBuilds` is the explicit allowlist for packages whose install scripts
#   may run. `@db-ux/db-theme` is included so its postinstall script can decrypt
#   the bundled assets using ASSET_PASSWORD / ASSET_INIT_VECTOR (see README).
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@db-ux/*'
blockExoticSubdeps: true

allowBuilds:
  '@db-ux/db-theme': true
  '@db-ux/db-theme-fonts': true
  '@db-ux/db-theme-icons': true
  '@db-ux/db-theme-illustrative-icons': true
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
